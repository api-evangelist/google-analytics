naftiko: "1.0.0-alpha1"

info:
  label: "Google Analytics Measurement Protocol (GA4)"
  description: "Send events directly to Google Analytics servers via HTTP requests for server-to-server and offline event tracking."
  tags:
    - Google Analytics
    - Measurement Protocol
    - Events
    - Tracking
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      GOOGLE_ANALYTICS_API_SECRET: GOOGLE_ANALYTICS_API_SECRET
      GOOGLE_ANALYTICS_MEASUREMENT_ID: GOOGLE_ANALYTICS_MEASUREMENT_ID

capability:
  consumes:
    - type: http
      namespace: ga-measurement-protocol
      baseUri: https://www.google-analytics.com/mp
      description: "Measurement Protocol for sending events directly to Google Analytics."
      resources:
        - name: events
          path: /
          description: "Send and validate events."
          operations:
            - name: send-events
              method: POST
              path: /collect
              description: "Send one or more events to Google Analytics for processing."
              inputParameters:
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API Secret from Google Analytics UI"
                - name: measurement_id
                  in: query
                  type: string
                  required: false
                  description: "Measurement ID for web data streams"
                - name: firebase_app_id
                  in: query
                  type: string
                  required: false
                  description: "Firebase App ID for app data streams"
              body:
                type: json
                data:
                  client_id: "{{tools.client_id}}"
                  user_id: "{{tools.user_id}}"
                  events: "{{tools.events}}"
                  user_properties: "{{tools.user_properties}}"
                  consent: "{{tools.consent}}"
                  timestamp_micros: "{{tools.timestamp_micros}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: validate-events
              method: POST
              path: /collect/debug
              description: "Validate event payloads without sending to Google Analytics."
              inputParameters:
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API Secret from Google Analytics UI"
                - name: measurement_id
                  in: query
                  type: string
                  required: false
                  description: "Measurement ID for web data streams"
                - name: firebase_app_id
                  in: query
                  type: string
                  required: false
                  description: "Firebase App ID for app data streams"
              body:
                type: json
                data:
                  client_id: "{{tools.client_id}}"
                  user_id: "{{tools.user_id}}"
                  events: "{{tools.events}}"
                  user_properties: "{{tools.user_properties}}"
                  consent: "{{tools.consent}}"
                  timestamp_micros: "{{tools.timestamp_micros}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: ga-measurement-rest
      resources:
        - path: /v1/events
          name: events
          description: "Send events to Google Analytics"
          operations:
            - method: POST
              name: send-events
              description: "Send events"
              call: "ga-measurement-protocol.send-events"
              with:
                api_secret: "rest.api_secret"
                measurement_id: "rest.measurement_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/events/validate
          name: validate-events
          description: "Validate events without sending"
          operations:
            - method: POST
              name: validate-events
              description: "Validate event payloads"
              call: "ga-measurement-protocol.validate-events"
              with:
                api_secret: "rest.api_secret"
                measurement_id: "rest.measurement_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: ga-measurement-mcp
      transport: http
      tools:
        - name: send-events
          description: "Send events to Google Analytics via Measurement Protocol"
          hints:
            readOnly: false
            idempotent: false
          call: "ga-measurement-protocol.send-events"
          with:
            api_secret: "tools.api_secret"
            measurement_id: "tools.measurement_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: validate-events
          description: "Validate event payloads without sending to Google Analytics"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-measurement-protocol.validate-events"
          with:
            api_secret: "tools.api_secret"
            measurement_id: "tools.measurement_id"
          outputParameters:
            - type: object
              mapping: "$."
