naftiko: 1.0.0-alpha2
info:
  label: Google Analytics Configuration Management
  description: Unified workflow for managing GA4 property configuration including accounts, properties, data streams, custom
    dimensions and metrics, conversion events, and integration links. Used by analytics administrators and platform engineers
    to set up and maintain GA4 properties.
  tags:
  - Google Analytics
  - Configuration
  - Admin
  - Management
  - GA4
  created: '2026-04-17'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GOOGLE_ANALYTICS_ACCESS_TOKEN: GOOGLE_ANALYTICS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: ga-admin-api
    baseUri: https://analyticsadmin.googleapis.com
    auth:
      type: bearer
      token: '{{GOOGLE_ANALYTICS_ACCESS_TOKEN}}'
    resources:
    - name: accounts
      path: /v1beta
      operations:
      - id: list-account-summaries
        method: GET
        path: /accountSummaries
        description: Returns summaries of all accounts accessible by the caller.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of AccountSummary resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: list-accounts
        method: GET
        path: /accounts
        description: Returns all accounts accessible by the caller.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        - name: showDeleted
          in: query
          type: boolean
          description: Whether to include soft-deleted accounts in the results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: provision-account-ticket
        method: POST
        path: /accounts:provisionAccountTicket
        description: Requests a ticket for creating an account.
        inputParameters:
        - name: account
          in: body
          type: object
          description: The account to create.
          properties:
            displayName:
              type: string
            regionCode:
              type: string
          value:
            displayName: '{{tools.displayName}}'
            regionCode: '{{tools.regionCode}}'
        - name: redirectUri
          in: body
          type: string
          description: Redirect URI where the user will be sent after accepting Terms of Service.
          value: '{{tools.redirectUri}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: search-change-history-events
        method: POST
        path: /{account}:searchChangeHistoryEvents
        description: Searches through the change history of an account.
        inputParameters:
        - name: account
          in: path
          type: string
          description: 'Required. The account resource for which to return change history resources. Format: accounts/{account_id}'
        - name: action
          in: body
          type: string
          description: Optional. If set, only return changes that match this action type.
          value: '{{tools.action}}'
        - name: actorEmail
          in: body
          type: string
          description: Optional. If set, only return changes made by this actor.
          value: '{{tools.actorEmail}}'
        - name: earliestChangeTime
          in: body
          type: string
          description: Optional. Earliest change time to filter by.
          value: '{{tools.earliestChangeTime}}'
        - name: latestChangeTime
          in: body
          type: string
          description: Optional. Latest change time to filter by.
          value: '{{tools.latestChangeTime}}'
        - name: pageSize
          in: body
          type: integer
          description: Optional. Maximum number of results to return.
          value: '{{tools.pageSize}}'
        - name: pageToken
          in: body
          type: string
          description: Optional. Page token for retrieving subsequent pages.
          value: '{{tools.pageToken}}'
        - name: property
          in: body
          type: string
          description: Optional. Resource name for a child property to filter by.
          value: '{{tools.property}}'
        - name: resourceType
          in: body
          type: string
          description: Optional. If set, only return changes for resources that match this type.
          value: '{{tools.resourceType}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: properties
      path: /v1beta
      operations:
      - id: list-properties
        method: GET
        path: /properties
        description: Returns child properties under the specified parent account.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Required. Filter expression for the list request.
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        - name: showDeleted
          in: query
          type: boolean
          description: Whether to include soft-deleted properties in the results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-property
        method: POST
        path: /properties
        description: Creates a GA4 property with the specified attributes.
        inputParameters:
        - name: displayName
          in: body
          type: string
          description: Required. Human-readable display name for this property.
          value: '{{tools.displayName}}'
        - name: timeZone
          in: body
          type: string
          description: Required. Reporting time zone for the property.
          value: '{{tools.timeZone}}'
        - name: currencyCode
          in: body
          type: string
          description: The currency type used in reports.
          value: '{{tools.currencyCode}}'
        - name: industryCategory
          in: body
          type: string
          description: Industry associated with this property.
          value: '{{tools.industryCategory}}'
        - name: account
          in: body
          type: string
          description: 'Required. Parent account resource name. Format: accounts/{account_id}'
          value: '{{tools.account}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: run-access-report
        method: POST
        path: /{entity}:runAccessReport
        description: Returns a customized report of data access records.
        inputParameters:
        - name: entity
          in: path
          type: string
          description: The Data Access Report supports requesting at the property or account level.
        - name: dateRanges
          in: body
          type: array
          description: Date ranges of access records to read.
          value: '{{tools.dateRanges}}'
        - name: dimensions
          in: body
          type: array
          description: The dimensions requested and displayed in the response.
          value: '{{tools.dimensions}}'
        - name: metrics
          in: body
          type: array
          description: The metrics requested and displayed in the response.
          value: '{{tools.metrics}}'
        - name: dimensionFilter
          in: body
          type: object
          description: Dimension filters to restrict the report data.
          value: '{{tools.dimensionFilter}}'
        - name: metricFilter
          in: body
          type: object
          description: Metric filters to restrict the report data.
          value: '{{tools.metricFilter}}'
        - name: offset
          in: body
          type: integer
          description: Row offset for the report.
          value: '{{tools.offset}}'
        - name: limit
          in: body
          type: integer
          description: The number of rows to return.
          value: '{{tools.limit}}'
        - name: orderBys
          in: body
          type: array
          description: Specifies how rows are ordered in the response.
          value: '{{tools.orderBys}}'
        - name: returnEntityQuota
          in: body
          type: boolean
          description: Whether to return the current quota state for this Analytics property.
          value: '{{tools.returnEntityQuota}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: acknowledge-user-data-collection
        method: POST
        path: /{property}:acknowledgeUserDataCollection
        description: Acknowledges the terms of user data collection for the specified property.
        inputParameters:
        - name: property
          in: path
          type: string
          description: 'Required. The property for which to acknowledge user data collection. Format: properties/{property_id}'
        - name: acknowledgement
          in: body
          type: string
          description: Required. An acknowledgement that the caller of this method understands the terms of user data collection.
          value: '{{tools.acknowledgement}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: conversion-events
      path: /v1beta
      operations:
      - id: list-conversion-events
        method: GET
        path: /{parent}/conversionEvents
        description: Returns a list of conversion events in the specified parent property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The resource name of the parent property. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-conversion-event
        method: POST
        path: /{parent}/conversionEvents
        description: Creates a conversion event with the specified attributes.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The resource name of the parent property. Format: properties/{property_id}'
        - name: eventName
          in: body
          type: string
          description: Required. The event name for this conversion event.
          value: '{{tools.eventName}}'
        - name: countingMethod
          in: body
          type: string
          description: The method by which conversions will be counted.
          value: '{{tools.countingMethod}}'
        - name: defaultConversionValue
          in: body
          type: object
          description: Optional default value for a conversion event.
          value: '{{tools.defaultConversionValue}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: custom-dimensions
      path: /v1beta
      operations:
      - id: list-custom-dimensions
        method: GET
        path: /{parent}/customDimensions
        description: Lists custom dimensions on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-custom-dimension
        method: POST
        path: /{parent}/customDimensions
        description: Creates a custom dimension.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: displayName
          in: body
          type: string
          description: Required. Display name for this custom dimension.
          value: '{{tools.displayName}}'
        - name: parameterName
          in: body
          type: string
          description: Required. Immutable. Tagging parameter name for this custom dimension.
          value: '{{tools.parameterName}}'
        - name: scope
          in: body
          type: string
          description: Required. Immutable. The scope of this dimension.
          value: '{{tools.scope}}'
        - name: description
          in: body
          type: string
          description: Optional. Description for this custom dimension.
          value: '{{tools.description}}'
        - name: disallowAdsPersonalization
          in: body
          type: boolean
          description: Optional. If true, sets this dimension as NPA and excludes it from ads personalization.
          value: '{{tools.disallowAdsPersonalization}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: custom-metrics
      path: /v1beta
      operations:
      - id: list-custom-metrics
        method: GET
        path: /{parent}/customMetrics
        description: Lists custom metrics on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-custom-metric
        method: POST
        path: /{parent}/customMetrics
        description: Creates a custom metric.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: displayName
          in: body
          type: string
          description: Required. Display name for this custom metric.
          value: '{{tools.displayName}}'
        - name: parameterName
          in: body
          type: string
          description: Required. Immutable. Tagging name for this custom metric.
          value: '{{tools.parameterName}}'
        - name: measurementUnit
          in: body
          type: string
          description: Required. The type for the custom metric's value.
          value: '{{tools.measurementUnit}}'
        - name: scope
          in: body
          type: string
          description: Required. Immutable. The scope of this custom metric.
          value: '{{tools.scope}}'
        - name: description
          in: body
          type: string
          description: Optional. Description for this custom metric.
          value: '{{tools.description}}'
        - name: restrictedMetricType
          in: body
          type: array
          description: Optional. Types of restricted data that this metric may contain.
          value: '{{tools.restrictedMetricType}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: archive-custom-metric
        method: POST
        path: /{name}:archive
        description: Archives a custom metric on a property.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. The name of the custom metric to archive. Format: properties/{property_id}/customMetrics/{custom_metric_id}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-streams
      path: /v1beta
      operations:
      - id: list-data-streams
        method: GET
        path: /{parent}/dataStreams
        description: Lists data streams on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-data-stream
        method: POST
        path: /{parent}/dataStreams
        description: Creates a data stream.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: type
          in: body
          type: string
          description: Required. Immutable. The type of this DataStream resource.
          value: '{{tools.type}}'
        - name: displayName
          in: body
          type: string
          description: Human-readable display name for the data stream.
          value: '{{tools.displayName}}'
        - name: webStreamData
          in: body
          type: object
          description: Data specific to web streams.
          value: '{{tools.webStreamData}}'
        - name: androidAppStreamData
          in: body
          type: object
          description: Data specific to Android app streams.
          value: '{{tools.androidAppStreamData}}'
        - name: iosAppStreamData
          in: body
          type: object
          description: Data specific to iOS app streams.
          value: '{{tools.iosAppStreamData}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: firebase-links
      path: /v1beta
      operations:
      - id: list-firebase-links
        method: GET
        path: /{parent}/firebaseLinks
        description: Lists FirebaseLinks on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-firebase-link
        method: POST
        path: /{parent}/firebaseLinks
        description: Creates a FirebaseLink.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: project
          in: body
          type: string
          description: 'Required. Immutable. The Firebase project resource name. Format: projects/{project_id}'
          value: '{{tools.project}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: google-ads-links
      path: /v1beta
      operations:
      - id: list-google-ads-links
        method: GET
        path: /{parent}/googleAdsLinks
        description: Lists GoogleAdsLinks on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-google-ads-link
        method: POST
        path: /{parent}/googleAdsLinks
        description: Creates a GoogleAdsLink.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: customerId
          in: body
          type: string
          description: Required. Immutable. Google Ads customer ID.
          value: '{{tools.customerId}}'
        - name: adsPersonalizationEnabled
          in: body
          type: boolean
          description: Enable personalized advertising features with this integration.
          value: '{{tools.adsPersonalizationEnabled}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: update-google-ads-link
        method: PATCH
        path: /{name}
        description: Updates a GoogleAdsLink on a property.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. Resource name of the GoogleAdsLink. Format: properties/{property_id}/googleAdsLinks/{google_ads_link_id}'
        - name: updateMask
          in: query
          type: string
          description: Required. The list of fields to update. Field names must be in snake_case.
        - name: adsPersonalizationEnabled
          in: body
          type: boolean
          description: Enable personalized advertising features with this integration.
          value: '{{tools.adsPersonalizationEnabled}}'
        - name: customerId
          in: body
          type: string
          description: Immutable. Google Ads customer ID.
          value: '{{tools.customerId}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: delete-google-ads-link
        method: DELETE
        path: /{name}
        description: Deletes a GoogleAdsLink on a property.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. Resource name of the GoogleAdsLink to delete. Format: properties/{property_id}/googleAdsLinks/{google_ads_link_id}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: measurement-protocol-secrets
      path: /v1beta
      operations:
      - id: list-measurement-protocol-secrets
        method: GET
        path: /{parent}/measurementProtocolSecrets
        description: Returns child MeasurementProtocolSecrets under the specified parent property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The resource name of the parent stream. Format: properties/{property_id}/dataStreams/{data_stream_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-measurement-protocol-secret
        method: POST
        path: /{parent}/measurementProtocolSecrets
        description: Creates a measurement protocol secret.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent resource name. Format: properties/{property_id}/dataStreams/{data_stream_id}'
        - name: displayName
          in: body
          type: string
          description: Required. Human-readable display name for this secret.
          value: '{{tools.displayName}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: get-measurement-protocol-secret
        method: GET
        path: /{name}
        description: Lookup for a single MeasurementProtocolSecret.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. The name of the measurement protocol secret to look up. Format: properties/{property_id}/dataStreams/{data_stream_id}/measurementProtocolSecrets/{measurement_protocol_secret_id}'
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: ga-config-api
    description: Unified REST API for Google Analytics configuration management.
    resources:
    - path: /v1/accounts
      name: accounts
      description: Manage GA4 accounts
      operations:
      - method: GET
        name: list-accounts
        description: List all accessible accounts
        call: ga-admin-api.list-accounts
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/account-summaries
      name: account-summaries
      description: View account summaries
      operations:
      - method: GET
        name: list-account-summaries
        description: List summaries of all accessible accounts
        call: ga-admin-api.list-account-summaries
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/properties
      name: properties
      description: Manage GA4 properties
      operations:
      - method: GET
        name: list-properties
        description: List GA4 properties
        call: ga-admin-api.list-properties
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-property
        description: Create a GA4 property
        call: ga-admin-api.create-property
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data-streams
      name: data-streams
      description: Manage data streams
      operations:
      - method: GET
        name: list-data-streams
        description: List data streams on a property
        call: ga-admin-api.list-data-streams
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-data-stream
        description: Create a data stream
        call: ga-admin-api.create-data-stream
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/custom-dimensions
      name: custom-dimensions
      description: Manage custom dimensions
      operations:
      - method: GET
        name: list-custom-dimensions
        description: List custom dimensions
        call: ga-admin-api.list-custom-dimensions
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-custom-dimension
        description: Create a custom dimension
        call: ga-admin-api.create-custom-dimension
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/custom-metrics
      name: custom-metrics
      description: Manage custom metrics
      operations:
      - method: GET
        name: list-custom-metrics
        description: List custom metrics
        call: ga-admin-api.list-custom-metrics
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-custom-metric
        description: Create a custom metric
        call: ga-admin-api.create-custom-metric
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/conversion-events
      name: conversion-events
      description: Manage conversion events
      operations:
      - method: GET
        name: list-conversion-events
        description: List conversion events
        call: ga-admin-api.list-conversion-events
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-conversion-event
        description: Create a conversion event
        call: ga-admin-api.create-conversion-event
        with:
          parent: rest.parent
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/change-history
      name: change-history
      description: Search change history
      operations:
      - method: POST
        name: search-change-history-events
        description: Search through account changes
        call: ga-admin-api.search-change-history-events
        with:
          account: rest.account
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9081
    namespace: ga-config-mcp
    transport: http
    description: MCP server for AI-assisted Google Analytics configuration management.
    tools:
    - name: list-accounts
      description: List all accessible Google Analytics accounts
      hints:
        readOnly: true
        idempotent: true
      call: ga-admin-api.list-accounts
      outputParameters:
      - type: object
        mapping: $.
    - name: list-account-summaries
      description: List summaries of all accessible accounts with their properties
      hints:
        readOnly: true
        idempotent: true
      call: ga-admin-api.list-account-summaries
      outputParameters:
      - type: object
        mapping: $.
    - name: provision-account-ticket
      description: Request a ticket for creating a new account
      hints:
        readOnly: false
        idempotent: false
      call: ga-admin-api.provision-account-ticket
      outputParameters:
      - type: object
