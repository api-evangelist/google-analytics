naftiko: 1.0.0-alpha2
info:
  label: Google Analytics Reporting and Insights
  description: Unified reporting workflow combining the Data API for running standard, realtime, and pivot reports with the
    Admin API for accessing data access audit reports. Used by data analysts, marketing teams, and BI engineers to extract
    insights from GA4 properties.
  tags:
  - Google Analytics
  - Reporting
  - Analytics
  - Insights
  - GA4
  created: '2026-04-17'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    GOOGLE_ANALYTICS_ACCESS_TOKEN: GOOGLE_ANALYTICS_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: ga-data-api
    baseUri: https://analyticsdata.googleapis.com
    description: Google Analytics Data API for running reports and managing audience exports.
    authentication:
      type: bearer
      token: '{{GOOGLE_ANALYTICS_ACCESS_TOKEN}}'
    resources:
    - name: reports
      path: /v1beta
      description: Run standard, pivot, realtime, and batch reports against GA4 properties.
      operations:
      - name: run-report
        method: POST
        path: /{property}:runReport
        description: Returns a customized report of Google Analytics event data.
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
          description: GA4 property identifier, e.g. properties/1234
        body:
          type: json
          data:
            dateRanges: '{{tools.dateRanges}}'
            dimensions: '{{tools.dimensions}}'
            metrics: '{{tools.metrics}}'
            dimensionFilter: '{{tools.dimensionFilter}}'
            metricFilter: '{{tools.metricFilter}}'
            limit: '{{tools.limit}}'
            offset: '{{tools.offset}}'
            orderBys: '{{tools.orderBys}}'
            keepEmptyRows: '{{tools.keepEmptyRows}}'
            returnPropertyQuota: '{{tools.returnPropertyQuota}}'
            currencyCode: '{{tools.currencyCode}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: run-realtime-report
        method: POST
        path: /{property}:runRealtimeReport
        description: Returns a customized report of realtime event data (last 30 minutes).
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
          description: GA4 property identifier
        body:
          type: json
          data:
            dimensions: '{{tools.dimensions}}'
            metrics: '{{tools.metrics}}'
            dimensionFilter: '{{tools.dimensionFilter}}'
            metricFilter: '{{tools.metricFilter}}'
            limit: '{{tools.limit}}'
            minuteRanges: '{{tools.minuteRanges}}'
            orderBys: '{{tools.orderBys}}'
            returnPropertyQuota: '{{tools.returnPropertyQuota}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: run-pivot-report
        method: POST
        path: /{property}:runPivotReport
        description: Returns a customized pivot report of Google Analytics event data.
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
          description: GA4 property identifier
        body:
          type: json
          data:
            dateRanges: '{{tools.dateRanges}}'
            dimensions: '{{tools.dimensions}}'
            metrics: '{{tools.metrics}}'
            pivots: '{{tools.pivots}}'
            dimensionFilter: '{{tools.dimensionFilter}}'
            metricFilter: '{{tools.metricFilter}}'
            keepEmptyRows: '{{tools.keepEmptyRows}}'
            returnPropertyQuota: '{{tools.returnPropertyQuota}}'
            currencyCode: '{{tools.currencyCode}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: batch-run-reports
        method: POST
        path: /{property}:batchRunReports
        description: Returns multiple reports in a batch. Up to 5 requests per batch.
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
          description: GA4 property identifier
        body:
          type: json
          data:
            requests: '{{tools.requests}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: batch-run-pivot-reports
        method: POST
        path: /{property}:batchRunPivotReports
        description: Returns multiple pivot reports in a batch. Up to 5 requests per batch.
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
          description: GA4 property identifier
        body:
          type: json
          data:
            requests: '{{tools.requests}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: check-compatibility
        method: POST
        path: /{property}:checkCompatibility
        description: Lists dimensions and metrics that can be added to a report while maintaining compatibility.
        inputParameters:
        - name: property
          in: path
          type: string
          required: true
          description: GA4 property identifier
        body:
          type: json
          data:
            dimensions: '{{tools.dimensions}}'
            metrics: '{{tools.metrics}}'
            compatibilityFilter: '{{tools.compatibilityFilter}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: audience-exports
      path: /v1beta
      description: Create and retrieve audience exports for GA4 properties.
      operations:
      - name: create-audience-export
        method: POST
        path: /{parent}/audienceExports
        description: Creates an audience export for later retrieval.
        inputParameters:
        - name: parent
          in: path
          type: string
          required: true
          description: 'Parent resource, format: properties/{property}'
        body:
          type: json
          data:
            audience: '{{tools.audience}}'
            dimensions: '{{tools.dimensions}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-audience-export
        method: GET
        path: /{name}
        description: Gets configuration metadata about a specific audience export.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: 'Audience export resource name, format: properties/{property}/audienceExports/{export}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-audience-exports
        method: GET
        path: /{parent}/audienceExports
        description: Lists all audience exports for a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          required: true
          description: 'Parent resource, format: properties/{property}'
        - name: pageSize
          in: query
          type: integer
          required: false
          description: Maximum number of results to return, max 1000
        - name: pageToken
          in: query
          type: string
          required: false
          description: Page token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: query-audience-export
        method: POST
        path: /{name}:query
        description: Retrieves users from an audience export.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
          description: Audience export resource name
        body:
          type: json
          data:
            limit: '{{tools.limit}}'
            offset: '{{tools.offset}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: ga-admin-api
    baseUri: https://analyticsadmin.googleapis.com
    auth:
      type: bearer
      token: '{{GOOGLE_ANALYTICS_ACCESS_TOKEN}}'
    resources:
    - name: accounts
      path: /v1beta
      operations:
      - id: list-account-summaries
        method: GET
        path: /accountSummaries
        description: Returns summaries of all accounts accessible by the caller.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of AccountSummary resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: list-accounts
        method: GET
        path: /accounts
        description: Returns all accounts accessible by the caller.
        inputParameters:
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        - name: showDeleted
          in: query
          type: boolean
          description: Whether to include soft-deleted accounts in the results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: provision-account-ticket
        method: POST
        path: /accounts:provisionAccountTicket
        description: Requests a ticket for creating an account.
        inputParameters:
        - name: account
          in: body
          type: object
          description: The account to create.
          properties:
            displayName:
              type: string
            regionCode:
              type: string
          value:
            displayName: '{{tools.displayName}}'
            regionCode: '{{tools.regionCode}}'
        - name: redirectUri
          in: body
          type: string
          description: Redirect URI where the user will be sent after accepting Terms of Service.
          value: '{{tools.redirectUri}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: search-change-history-events
        method: POST
        path: /{account}:searchChangeHistoryEvents
        description: Searches through the change history of an account.
        inputParameters:
        - name: account
          in: path
          type: string
          description: 'Required. The account resource for which to return change history resources. Format: accounts/{account_id}'
        - name: action
          in: body
          type: string
          description: Optional. If set, only return changes that match this action type.
          value: '{{tools.action}}'
        - name: actorEmail
          in: body
          type: string
          description: Optional. If set, only return changes made by this actor.
          value: '{{tools.actorEmail}}'
        - name: earliestChangeTime
          in: body
          type: string
          description: Optional. Earliest change time to filter by.
          value: '{{tools.earliestChangeTime}}'
        - name: latestChangeTime
          in: body
          type: string
          description: Optional. Latest change time to filter by.
          value: '{{tools.latestChangeTime}}'
        - name: pageSize
          in: body
          type: integer
          description: Optional. Maximum number of results to return.
          value: '{{tools.pageSize}}'
        - name: pageToken
          in: body
          type: string
          description: Optional. Page token for retrieving subsequent pages.
          value: '{{tools.pageToken}}'
        - name: property
          in: body
          type: string
          description: Optional. Resource name for a child property to filter by.
          value: '{{tools.property}}'
        - name: resourceType
          in: body
          type: string
          description: Optional. If set, only return changes for resources that match this type.
          value: '{{tools.resourceType}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: properties
      path: /v1beta
      operations:
      - id: list-properties
        method: GET
        path: /properties
        description: Returns child properties under the specified parent account.
        inputParameters:
        - name: filter
          in: query
          type: string
          description: Required. Filter expression for the list request.
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        - name: showDeleted
          in: query
          type: boolean
          description: Whether to include soft-deleted properties in the results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-property
        method: POST
        path: /properties
        description: Creates a GA4 property with the specified attributes.
        inputParameters:
        - name: displayName
          in: body
          type: string
          description: Required. Human-readable display name for this property.
          value: '{{tools.displayName}}'
        - name: timeZone
          in: body
          type: string
          description: Required. Reporting time zone for the property.
          value: '{{tools.timeZone}}'
        - name: currencyCode
          in: body
          type: string
          description: The currency type used in reports.
          value: '{{tools.currencyCode}}'
        - name: industryCategory
          in: body
          type: string
          description: Industry associated with this property.
          value: '{{tools.industryCategory}}'
        - name: account
          in: body
          type: string
          description: 'Required. Parent account resource name. Format: accounts/{account_id}'
          value: '{{tools.account}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: run-access-report
        method: POST
        path: /{entity}:runAccessReport
        description: Returns a customized report of data access records.
        inputParameters:
        - name: entity
          in: path
          type: string
          description: The Data Access Report supports requesting at the property or account level.
        - name: dateRanges
          in: body
          type: array
          description: Date ranges of access records to read.
          value: '{{tools.dateRanges}}'
        - name: dimensions
          in: body
          type: array
          description: The dimensions requested and displayed in the response.
          value: '{{tools.dimensions}}'
        - name: metrics
          in: body
          type: array
          description: The metrics requested and displayed in the response.
          value: '{{tools.metrics}}'
        - name: dimensionFilter
          in: body
          type: object
          description: Dimension filters to restrict the report data.
          value: '{{tools.dimensionFilter}}'
        - name: metricFilter
          in: body
          type: object
          description: Metric filters to restrict the report data.
          value: '{{tools.metricFilter}}'
        - name: offset
          in: body
          type: integer
          description: Row offset for the report.
          value: '{{tools.offset}}'
        - name: limit
          in: body
          type: integer
          description: The number of rows to return.
          value: '{{tools.limit}}'
        - name: orderBys
          in: body
          type: array
          description: Specifies how rows are ordered in the response.
          value: '{{tools.orderBys}}'
        - name: returnEntityQuota
          in: body
          type: boolean
          description: Whether to return the current quota state for this Analytics property.
          value: '{{tools.returnEntityQuota}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: acknowledge-user-data-collection
        method: POST
        path: /{property}:acknowledgeUserDataCollection
        description: Acknowledges the terms of user data collection for the specified property.
        inputParameters:
        - name: property
          in: path
          type: string
          description: 'Required. The property for which to acknowledge user data collection. Format: properties/{property_id}'
        - name: acknowledgement
          in: body
          type: string
          description: Required. An acknowledgement that the caller of this method understands the terms of user data collection.
          value: '{{tools.acknowledgement}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: conversion-events
      path: /v1beta
      operations:
      - id: list-conversion-events
        method: GET
        path: /{parent}/conversionEvents
        description: Returns a list of conversion events in the specified parent property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The resource name of the parent property. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-conversion-event
        method: POST
        path: /{parent}/conversionEvents
        description: Creates a conversion event with the specified attributes.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The resource name of the parent property. Format: properties/{property_id}'
        - name: eventName
          in: body
          type: string
          description: Required. The event name for this conversion event.
          value: '{{tools.eventName}}'
        - name: countingMethod
          in: body
          type: string
          description: The method by which conversions will be counted.
          value: '{{tools.countingMethod}}'
        - name: defaultConversionValue
          in: body
          type: object
          description: Optional default value for a conversion event.
          value: '{{tools.defaultConversionValue}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: custom-dimensions
      path: /v1beta
      operations:
      - id: list-custom-dimensions
        method: GET
        path: /{parent}/customDimensions
        description: Lists custom dimensions on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-custom-dimension
        method: POST
        path: /{parent}/customDimensions
        description: Creates a custom dimension.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: displayName
          in: body
          type: string
          description: Required. Display name for this custom dimension.
          value: '{{tools.displayName}}'
        - name: parameterName
          in: body
          type: string
          description: Required. Immutable. Tagging parameter name for this custom dimension.
          value: '{{tools.parameterName}}'
        - name: scope
          in: body
          type: string
          description: Required. Immutable. The scope of this dimension.
          value: '{{tools.scope}}'
        - name: description
          in: body
          type: string
          description: Optional. Description for this custom dimension.
          value: '{{tools.description}}'
        - name: disallowAdsPersonalization
          in: body
          type: boolean
          description: Optional. If true, sets this dimension as NPA and excludes it from ads personalization.
          value: '{{tools.disallowAdsPersonalization}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: custom-metrics
      path: /v1beta
      operations:
      - id: list-custom-metrics
        method: GET
        path: /{parent}/customMetrics
        description: Lists custom metrics on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-custom-metric
        method: POST
        path: /{parent}/customMetrics
        description: Creates a custom metric.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: displayName
          in: body
          type: string
          description: Required. Display name for this custom metric.
          value: '{{tools.displayName}}'
        - name: parameterName
          in: body
          type: string
          description: Required. Immutable. Tagging name for this custom metric.
          value: '{{tools.parameterName}}'
        - name: measurementUnit
          in: body
          type: string
          description: Required. The type for the custom metric's value.
          value: '{{tools.measurementUnit}}'
        - name: scope
          in: body
          type: string
          description: Required. Immutable. The scope of this custom metric.
          value: '{{tools.scope}}'
        - name: description
          in: body
          type: string
          description: Optional. Description for this custom metric.
          value: '{{tools.description}}'
        - name: restrictedMetricType
          in: body
          type: array
          description: Optional. Types of restricted data that this metric may contain.
          value: '{{tools.restrictedMetricType}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: archive-custom-metric
        method: POST
        path: /{name}:archive
        description: Archives a custom metric on a property.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. The name of the custom metric to archive. Format: properties/{property_id}/customMetrics/{custom_metric_id}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: data-streams
      path: /v1beta
      operations:
      - id: list-data-streams
        method: GET
        path: /{parent}/dataStreams
        description: Lists data streams on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-data-stream
        method: POST
        path: /{parent}/dataStreams
        description: Creates a data stream.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: type
          in: body
          type: string
          description: Required. Immutable. The type of this DataStream resource.
          value: '{{tools.type}}'
        - name: displayName
          in: body
          type: string
          description: Human-readable display name for the data stream.
          value: '{{tools.displayName}}'
        - name: webStreamData
          in: body
          type: object
          description: Data specific to web streams.
          value: '{{tools.webStreamData}}'
        - name: androidAppStreamData
          in: body
          type: object
          description: Data specific to Android app streams.
          value: '{{tools.androidAppStreamData}}'
        - name: iosAppStreamData
          in: body
          type: object
          description: Data specific to iOS app streams.
          value: '{{tools.iosAppStreamData}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: firebase-links
      path: /v1beta
      operations:
      - id: list-firebase-links
        method: GET
        path: /{parent}/firebaseLinks
        description: Lists FirebaseLinks on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-firebase-link
        method: POST
        path: /{parent}/firebaseLinks
        description: Creates a FirebaseLink.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: project
          in: body
          type: string
          description: 'Required. Immutable. The Firebase project resource name. Format: projects/{project_id}'
          value: '{{tools.project}}'
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: google-ads-links
      path: /v1beta
      operations:
      - id: list-google-ads-links
        method: GET
        path: /{parent}/googleAdsLinks
        description: Lists GoogleAdsLinks on a property.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: pageSize
          in: query
          type: integer
          description: Maximum number of resources to return.
        - name: pageToken
          in: query
          type: string
          description: Page token for retrieving the next page of results.
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: create-google-ads-link
        method: POST
        path: /{parent}/googleAdsLinks
        description: Creates a GoogleAdsLink.
        inputParameters:
        - name: parent
          in: path
          type: string
          description: 'Required. The parent property resource name. Format: properties/{property_id}'
        - name: customerId
          in: body
          type: string
          description: Required. Immutable. Google Ads customer ID.
          value: '{{tools.customerId}}'
        - name: adsPersonalizationEnabled
          in: body
          type: boolean
          description: Enable personalized advertising features with this integration.
          value: '{{tools.adsPersonalizationEnabled}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: update-google-ads-link
        method: PATCH
        path: /{name}
        description: Updates a GoogleAdsLink on a property.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. Resource name of the GoogleAdsLink. Format: properties/{property_id}/googleAdsLinks/{google_ads_link_id}'
        - name: updateMask
          in: query
          type: string
          description: Required. The list of fields to update. Field names must be in snake_case.
        - name: adsPersonalizationEnabled
          in: body
          type: boolean
          description: Enable personalized advertising features with this integration.
          value: '{{tools.adsPersonalizationEnabled}}'
        - name: customerId
          in: body
          type: string
          description: Immutable. Google Ads customer ID.
          value: '{{tools.customerId}}'
        outputParameters:
        - name: result
          type: object
          value: $.
      - id: delete-google-ads-link
        method: DELETE
        path: /{name}
        description: Deletes a GoogleAdsLink on a property.
        inputParameters:
        - name: name
          in: path
          type: string
          description: 'Required. Resource name of the GoogleAdsLink to delete. Format: properties/{property_id}/googleAdsLinks/{google_ads_link_id}'
        outputParameters:
        - name: result
          type: object
          value: $.
