naftiko: 1.0.0-alpha2
info:
  label: Google Analytics API — provisioning
  description: 'Google Analytics API — provisioning. 2 operations. Lead operation: provisioning. Self-contained Naftiko capability
    covering one Google Analytics business surface.'
  tags:
  - Google Analytics
  - provisioning
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GOOGLE_ANALYTICS_API_KEY: GOOGLE_ANALYTICS_API_KEY
capability:
  consumes:
  - type: http
    namespace: management-api-v3-provisioning
    baseUri: https://analytics.googleapis.com/analytics/v3
    description: Google Analytics API — provisioning business capability. Self-contained, no shared references.
    resources:
    - name: provisioning-createAccountTicket
      path: /provisioning/createAccountTicket
      operations:
      - name: analyticsprovisioningcreateaccountticket
        method: POST
        description: Creates an account ticket.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: provisioning-createAccountTree
      path: /provisioning/createAccountTree
      operations:
      - name: analyticsprovisioningcreateaccounttree
        method: POST
        description: Provision account.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    authentication:
      type: bearer
      token: '{{env.GOOGLE_ANALYTICS_API_KEY}}'
  exposes:
  - type: rest
    namespace: management-api-v3-provisioning-rest
    port: 8080
    description: REST adapter for Google Analytics API — provisioning. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/provisioning/createaccountticket
      name: provisioning-createaccountticket
      description: REST surface for provisioning-createAccountTicket.
      operations:
      - method: POST
        name: analyticsprovisioningcreateaccountticket
        description: Creates an account ticket.
        call: management-api-v3-provisioning.analyticsprovisioningcreateaccountticket
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/provisioning/createaccounttree
      name: provisioning-createaccounttree
      description: REST surface for provisioning-createAccountTree.
      operations:
      - method: POST
        name: analyticsprovisioningcreateaccounttree
        description: Provision account.
        call: management-api-v3-provisioning.analyticsprovisioningcreateaccounttree
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: management-api-v3-provisioning-mcp
    port: 9090
    transport: http
    description: MCP adapter for Google Analytics API — provisioning. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: creates-account-ticket
      description: Creates an account ticket.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-api-v3-provisioning.analyticsprovisioningcreateaccountticket
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: provision-account
      description: Provision account.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: management-api-v3-provisioning.analyticsprovisioningcreateaccounttree
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
