specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Google Analytics
providerId: google-analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Data
  - Google
  - Web Analytics
  - Reporting
  - Rate Limiting
description: Google Analytics Data API enforces token-based quotas per GA4 property, applied separately
  to Core (runReport/runPivotReport/batch/getMetadata), Realtime (runRealtimeReport), and Funnel (runFunnelReport)
  request categories. Standard GA4 properties and Analytics 360 properties have different limits (360
  is 10x standard). Daily quotas refresh at midnight Pacific Time.
sources:
  - https://developers.google.com/analytics/devguides/reporting/data/v1/quotas
  - https://developers.google.com/analytics/devguides/reporting/data/v1/basics
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serverError: 500
limits:
  - name: Core tokens — daily (Standard)
    scope: property
    metric: tokens_per_day
    limit: 200000
    timeFrame: day
    notes: Applies to runReport, runPivotReport, batch methods, getMetadata. Refresh at midnight PST.
  - name: Core tokens — hourly (Standard)
    scope: property
    metric: tokens_per_hour
    limit: 40000
    timeFrame: hour
  - name: Core tokens — hourly per project/property (Standard)
    scope: project/property
    metric: tokens_per_hour
    limit: 14000
    timeFrame: hour
  - name: Concurrent requests (Standard)
    scope: property
    metric: concurrent_requests
    limit: 10
  - name: Server errors per hour (Standard)
    scope: project/property
    metric: errors_per_hour
    limit: 10
    timeFrame: hour
    notes: Property is throttled if more than this many 5xx responses are returned in the hour.
  - name: Core tokens — daily (Analytics 360)
    scope: property
    metric: tokens_per_day
    limit: 2000000
    timeFrame: day
  - name: Core tokens — hourly (Analytics 360)
    scope: property
    metric: tokens_per_hour
    limit: 400000
    timeFrame: hour
  - name: Core tokens — hourly per project/property (Analytics 360)
    scope: project/property
    metric: tokens_per_hour
    limit: 140000
    timeFrame: hour
  - name: Concurrent requests (Analytics 360)
    scope: property
    metric: concurrent_requests
    limit: 50
  - name: Server errors per hour (Analytics 360)
    scope: project/property
    metric: errors_per_hour
    limit: 50
    timeFrame: hour
policies:
  - name: Token-based pricing
    description: 'Token cost varies by row count, dimensions/metrics, filter complexity, date range, and
      cardinality. Send returnPropertyQuota=true in requests to see remaining tokens in the response.'
  - name: Separate categories
    description: Core, Realtime, and Funnel categories each have their own independent quota buckets.
  - name: Backoff strategy
    description: Implement exponential backoff with jitter on 429 responses. Daily resets at midnight Pacific.
  - name: Sampling on Standard
    description: Reports may sample at high cardinality on Standard properties; 360 properties get unsampled
      reporting up to higher row caps.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
