naftiko: "1.0.0-alpha1"

info:
  label: "Google Analytics Data API (GA4)"
  description: "Provides programmatic access to Google Analytics 4 report data including standard reports, pivot reports, real-time reports, funnel reports, and audience exports."
  tags:
    - Google Analytics
    - Reporting
    - GA4
    - Analytics
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      GOOGLE_ANALYTICS_ACCESS_TOKEN: GOOGLE_ANALYTICS_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: ga-data-api
      baseUri: https://analyticsdata.googleapis.com
      description: "Google Analytics Data API for running reports and managing audience exports."
      authentication:
        type: bearer
        token: "{{GOOGLE_ANALYTICS_ACCESS_TOKEN}}"
      resources:
        - name: reports
          path: /v1beta
          description: "Run standard, pivot, realtime, and batch reports against GA4 properties."
          operations:
            - name: run-report
              method: POST
              path: /{property}:runReport
              description: "Returns a customized report of Google Analytics event data."
              inputParameters:
                - name: property
                  in: path
                  type: string
                  required: true
                  description: "GA4 property identifier, e.g. properties/1234"
              body:
                type: json
                data:
                  dateRanges: "{{tools.dateRanges}}"
                  dimensions: "{{tools.dimensions}}"
                  metrics: "{{tools.metrics}}"
                  dimensionFilter: "{{tools.dimensionFilter}}"
                  metricFilter: "{{tools.metricFilter}}"
                  limit: "{{tools.limit}}"
                  offset: "{{tools.offset}}"
                  orderBys: "{{tools.orderBys}}"
                  keepEmptyRows: "{{tools.keepEmptyRows}}"
                  returnPropertyQuota: "{{tools.returnPropertyQuota}}"
                  currencyCode: "{{tools.currencyCode}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: run-realtime-report
              method: POST
              path: /{property}:runRealtimeReport
              description: "Returns a customized report of realtime event data (last 30 minutes)."
              inputParameters:
                - name: property
                  in: path
                  type: string
                  required: true
                  description: "GA4 property identifier"
              body:
                type: json
                data:
                  dimensions: "{{tools.dimensions}}"
                  metrics: "{{tools.metrics}}"
                  dimensionFilter: "{{tools.dimensionFilter}}"
                  metricFilter: "{{tools.metricFilter}}"
                  limit: "{{tools.limit}}"
                  minuteRanges: "{{tools.minuteRanges}}"
                  orderBys: "{{tools.orderBys}}"
                  returnPropertyQuota: "{{tools.returnPropertyQuota}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: run-pivot-report
              method: POST
              path: /{property}:runPivotReport
              description: "Returns a customized pivot report of Google Analytics event data."
              inputParameters:
                - name: property
                  in: path
                  type: string
                  required: true
                  description: "GA4 property identifier"
              body:
                type: json
                data:
                  dateRanges: "{{tools.dateRanges}}"
                  dimensions: "{{tools.dimensions}}"
                  metrics: "{{tools.metrics}}"
                  pivots: "{{tools.pivots}}"
                  dimensionFilter: "{{tools.dimensionFilter}}"
                  metricFilter: "{{tools.metricFilter}}"
                  keepEmptyRows: "{{tools.keepEmptyRows}}"
                  returnPropertyQuota: "{{tools.returnPropertyQuota}}"
                  currencyCode: "{{tools.currencyCode}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: batch-run-reports
              method: POST
              path: /{property}:batchRunReports
              description: "Returns multiple reports in a batch. Up to 5 requests per batch."
              inputParameters:
                - name: property
                  in: path
                  type: string
                  required: true
                  description: "GA4 property identifier"
              body:
                type: json
                data:
                  requests: "{{tools.requests}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: batch-run-pivot-reports
              method: POST
              path: /{property}:batchRunPivotReports
              description: "Returns multiple pivot reports in a batch. Up to 5 requests per batch."
              inputParameters:
                - name: property
                  in: path
                  type: string
                  required: true
                  description: "GA4 property identifier"
              body:
                type: json
                data:
                  requests: "{{tools.requests}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: check-compatibility
              method: POST
              path: /{property}:checkCompatibility
              description: "Lists dimensions and metrics that can be added to a report while maintaining compatibility."
              inputParameters:
                - name: property
                  in: path
                  type: string
                  required: true
                  description: "GA4 property identifier"
              body:
                type: json
                data:
                  dimensions: "{{tools.dimensions}}"
                  metrics: "{{tools.metrics}}"
                  compatibilityFilter: "{{tools.compatibilityFilter}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: audience-exports
          path: /v1beta
          description: "Create and retrieve audience exports for GA4 properties."
          operations:
            - name: create-audience-export
              method: POST
              path: /{parent}/audienceExports
              description: "Creates an audience export for later retrieval."
              inputParameters:
                - name: parent
                  in: path
                  type: string
                  required: true
                  description: "Parent resource, format: properties/{property}"
              body:
                type: json
                data:
                  audience: "{{tools.audience}}"
                  dimensions: "{{tools.dimensions}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-audience-export
              method: GET
              path: /{name}
              description: "Gets configuration metadata about a specific audience export."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Audience export resource name, format: properties/{property}/audienceExports/{export}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-audience-exports
              method: GET
              path: /{parent}/audienceExports
              description: "Lists all audience exports for a property."
              inputParameters:
                - name: parent
                  in: path
                  type: string
                  required: true
                  description: "Parent resource, format: properties/{property}"
                - name: pageSize
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return, max 1000"
                - name: pageToken
                  in: query
                  type: string
                  required: false
                  description: "Page token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: query-audience-export
              method: POST
              path: /{name}:query
              description: "Retrieves users from an audience export."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Audience export resource name"
              body:
                type: json
                data:
                  limit: "{{tools.limit}}"
                  offset: "{{tools.offset}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ga-data-rest
      resources:
        - path: /v1/reports
          name: reports
          description: "Run standard GA4 reports"
          operations:
            - method: POST
              name: run-report
              description: "Run a standard report"
              call: "ga-data-api.run-report"
              with:
                property: "rest.property"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports/realtime
          name: realtime-reports
          description: "Run realtime GA4 reports"
          operations:
            - method: POST
              name: run-realtime-report
              description: "Run a realtime report"
              call: "ga-data-api.run-realtime-report"
              with:
                property: "rest.property"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports/pivot
          name: pivot-reports
          description: "Run pivot GA4 reports"
          operations:
            - method: POST
              name: run-pivot-report
              description: "Run a pivot report"
              call: "ga-data-api.run-pivot-report"
              with:
                property: "rest.property"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports/batch
          name: batch-reports
          description: "Run batch GA4 reports"
          operations:
            - method: POST
              name: batch-run-reports
              description: "Run multiple reports in a batch"
              call: "ga-data-api.batch-run-reports"
              with:
                property: "rest.property"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/reports/pivot/batch
          name: batch-pivot-reports
          description: "Run batch pivot GA4 reports"
          operations:
            - method: POST
              name: batch-run-pivot-reports
              description: "Run multiple pivot reports in a batch"
              call: "ga-data-api.batch-run-pivot-reports"
              with:
                property: "rest.property"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/compatibility
          name: compatibility
          description: "Check dimension and metric compatibility"
          operations:
            - method: POST
              name: check-compatibility
              description: "Check if dimensions and metrics are compatible"
              call: "ga-data-api.check-compatibility"
              with:
                property: "rest.property"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audience-exports
          name: audience-exports
          description: "Manage audience exports"
          operations:
            - method: POST
              name: create-audience-export
              description: "Create an audience export"
              call: "ga-data-api.create-audience-export"
              with:
                parent: "rest.parent"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-audience-exports
              description: "List audience exports"
              call: "ga-data-api.list-audience-exports"
              with:
                parent: "rest.parent"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audience-exports/{id}
          name: audience-export
          description: "Get a specific audience export"
          operations:
            - method: GET
              name: get-audience-export
              description: "Get audience export details"
              call: "ga-data-api.get-audience-export"
              with:
                name: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/audience-exports/{id}/query
          name: audience-export-query
          description: "Query audience export users"
          operations:
            - method: POST
              name: query-audience-export
              description: "Retrieve users from an audience export"
              call: "ga-data-api.query-audience-export"
              with:
                name: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ga-data-mcp
      transport: http
      tools:
        - name: run-report
          description: "Run a standard GA4 report with dimensions, metrics, and date ranges"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.run-report"
          with:
            property: "tools.property"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-realtime-report
          description: "Run a realtime report showing events from the last 30 minutes"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.run-realtime-report"
          with:
            property: "tools.property"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-pivot-report
          description: "Run an advanced pivot table report"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.run-pivot-report"
          with:
            property: "tools.property"
          outputParameters:
            - type: object
              mapping: "$."
        - name: batch-run-reports
          description: "Run up to 5 standard reports in a single batch request"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.batch-run-reports"
          with:
            property: "tools.property"
          outputParameters:
            - type: object
              mapping: "$."
        - name: batch-run-pivot-reports
          description: "Run up to 5 pivot reports in a single batch request"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.batch-run-pivot-reports"
          with:
            property: "tools.property"
          outputParameters:
            - type: object
              mapping: "$."
        - name: check-compatibility
          description: "Check if dimensions and metrics are compatible for a report"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.check-compatibility"
          with:
            property: "tools.property"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-audience-export
          description: "Create an audience export for later retrieval"
          hints:
            readOnly: false
            idempotent: false
          call: "ga-data-api.create-audience-export"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-audience-export
          description: "Get metadata about a specific audience export"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.get-audience-export"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-audience-exports
          description: "List all audience exports for a property"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.list-audience-exports"
          with:
            parent: "tools.parent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: query-audience-export
          description: "Retrieve users from a completed audience export"
          hints:
            readOnly: true
            idempotent: true
          call: "ga-data-api.query-audience-export"
          with:
            name: "tools.name"
          outputParameters:
            - type: object
              mapping: "$."
