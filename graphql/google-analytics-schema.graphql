}

"""
A single step in an audience sequence filter.
"""
type AudienceSequenceStep {
  scope: AudienceFilterScope!
  immediatelyFollows: Boolean
  constraintDuration: String
  filterExpression: AudienceFilterExpression
}

"""
A filter expression for audience membership conditions.
"""
type AudienceFilterExpression {
  andGroup: AudienceFilterExpressionList
  orGroup: AudienceFilterExpressionList
  notExpression: AudienceFilterExpression
  dimensionOrMetricFilter: AudienceDimensionOrMetricFilter
  eventFilter: AudienceEventFilter
}

"""
A list of audience filter expressions combined with AND or OR.
"""
type AudienceFilterExpressionList {
  filterExpressions: [AudienceFilterExpression!]!
}

"""
A filter for a dimension or metric used in audience definition.
"""
type AudienceDimensionOrMetricFilter {
  fieldName: String!
  atAnyPointInTime: Boolean
  inAnyNDayPeriod: Int
  stringFilter: StringFilter
  inListFilter: InListFilter
  numericFilter: NumericFilter
  betweenFilter: BetweenFilter
}

"""
An event filter used in audience definition.
"""
type AudienceEventFilter {
  eventName: String!
  eventParameterFilterExpression: AudienceFilterExpression
}

"""
A filter for an audience.
"""
type AudienceFilter {
  fieldName: String!
  stringFilter: StringFilter
  inListFilter: InListFilter
}

