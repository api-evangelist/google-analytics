# ─── Root Operations ──────────────────────────────────────────────────────────

type Query {
  # Account & Property
  listAccounts(pageSize: Int, pageToken: String, showDeleted: Boolean): [Account!]
  getAccount(name: String!): Account
  listAccountSummaries(pageSize: Int, pageToken: String): [AccountSummary!]
  listProperties(filter: String!, pageSize: Int, pageToken: String, showDeleted: Boolean): [Property!]
  getProperty(name: String!): Property

  # Data Streams
  listDataStreams(parent: String!, pageSize: Int, pageToken: String): [DataStream!]
  getDataStream(name: String!): DataStream

  # Configuration Resources
  listMeasurementProtocolSecrets(parent: String!, pageSize: Int, pageToken: String): [MeasurementProtocolSecret!]
  getMeasurementProtocolSecret(name: String!): MeasurementProtocolSecret
  listFirebaseLinks(parent: String!, pageSize: Int, pageToken: String): [FirebaseLink!]
  listGoogleAdsLinks(parent: String!, pageSize: Int, pageToken: String): [GoogleAdsLink!]
  listBigQueryLinks(parent: String!, pageSize: Int, pageToken: String): [BigQueryLink!]
  getAttribution(name: String!): Attribution

  # Conversion Events & Key Events
  listConversionEvents(parent: String!, pageSize: Int, pageToken: String): [ConversionEvent!]
  getConversionEvent(name: String!): ConversionEvent
  listKeyEvents(parent: String!, pageSize: Int, pageToken: String): [KeyEvent!]
  getKeyEvent(name: String!): KeyEvent

  # Custom Dimensions & Metrics
  listCustomDimensions(parent: String!, pageSize: Int, pageToken: String): [CustomDimension!]
  getCustomDimension(name: String!): CustomDimension
  listCustomMetrics(parent: String!, pageSize: Int, pageToken: String): [CustomMetric!]
  getCustomMetric(name: String!): CustomMetric

  # Audiences
  listAudiences(parent: String!, pageSize: Int, pageToken: String): [AudienceDefinition!]
  getAudience(name: String!): AudienceDefinition

  # Data API Reporting
  runReport(property: String!, request: ReportRequest!): ReportResponse
  runPivotReport(property: String!, request: ReportRequest!): ReportResponse
  batchRunReports(property: String!, requests: [ReportRequest!]!): BatchRunReportResponse
  runRealtimeReport(property: String!, request: RunRealtimeReport!): RunRealtimeReportResponse
  runFunnelReport(property: String!, funnel: Funnel!, dateRanges: [DateRange!]!): ReportResponse
  runAccessReport(entity: String!, request: RunAccessReport!): ReportResponse
  checkCompatibility(property: String!, dimensions: [Dimension!], metrics: [Metric!]): JSON

  # Audiences & Exports
  listAudienceExports(parent: String!, pageSize: Int, pageToken: String): [Audience!]
  queryAudienceExport(name: String!, offset: String, limit: String): [UserRow!]

  # Quota
  getPropertyQuota(property: String!): PropertyQuota
}

type Mutation {
  # Property Management
  createProperty(property: Property!): Property
  updateProperty(name: String!, property: Property!): Property
  deleteProperty(name: String!): Property

  # Data Streams
  createDataStream(parent: String!, dataStream: DataStream!): DataStream
  updateDataStream(name: String!, dataStream: DataStream!): DataStream
  deleteDataStream(name: String!): Boolean

  # Measurement Protocol Secrets
  createMeasurementProtocolSecret(parent: String!, secret: MeasurementProtocolSecret!): MeasurementProtocolSecret
  updateMeasurementProtocolSecret(name: String!, secret: MeasurementProtocolSecret!): MeasurementProtocolSecret
  deleteMeasurementProtocolSecret(name: String!): Boolean

  # Firebase & Google Ads Links
  createFirebaseLink(parent: String!, link: FirebaseLink!): FirebaseLink
  deleteFirebaseLink(name: String!): Boolean
  createGoogleAdsLink(parent: String!, link: GoogleAdsLink!): GoogleAdsLink
  updateGoogleAdsLink(name: String!, link: GoogleAdsLink!): GoogleAdsLink
  deleteGoogleAdsLink(name: String!): Boolean

  # Conversion Events & Key Events
  createConversionEvent(parent: String!, conversionEvent: ConversionEvent!): ConversionEvent
  updateConversionEvent(name: String!, conversionEvent: ConversionEvent!): ConversionEvent
  deleteConversionEvent(name: String!): Boolean
  createKeyEvent(parent: String!, keyEvent: KeyEvent!): KeyEvent
  updateKeyEvent(name: String!, keyEvent: KeyEvent!): KeyEvent
  deleteKeyEvent(name: String!): Boolean

  # Custom Dimensions & Metrics
  createCustomDimension(parent: String!, customDimension: CustomDimension!): CustomDimension
  updateCustomDimension(name: String!, customDimension: CustomDimension!): CustomDimension
  archiveCustomDimension(name: String!): Boolean
  createCustomMetric(parent: String!, customMetric: CustomMetric!): CustomMetric
  updateCustomMetric(name: String!, customMetric: CustomMetric!): CustomMetric
  archiveCustomMetric(name: String!): Boolean

  # Audiences
  createAudience(parent: String!, audience: AudienceDefinition!): AudienceDefinition
  updateAudience(name: String!, audience: AudienceDefinition!): AudienceDefinition
  archiveAudience(name: String!): Boolean

  # Audience Exports
  createAudienceExport(parent: String!, audience: Audience!): Audience

  # Event Creation Rules
  createEventCreateRule(parent: String!, rule: EventCreateRule!): EventCreateRule
  updateEventCreateRule(name: String!, rule: EventCreateRule!): EventCreateRule
  deleteEventCreateRule(name: String!): Boolean
}
