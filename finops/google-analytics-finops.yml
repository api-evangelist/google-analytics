specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Google Analytics
providerId: google-analytics
publisherName: Google LLC
serviceCategory: Web Analytics
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Web Analytics
  - Google
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Google Analytics: GA4 Standard is free with token-quota throttling
  rather than line-item billing; Analytics 360 is a contracted enterprise license invoiced annually by
  Google. The token quota functions as the practical FinOps lever for GA4 spend predictability.'
sources:
  - https://developers.google.com/analytics/devguides/reporting/data/v1/quotas
  - https://marketingplatform.google.com/about/analytics-360/
  - https://support.google.com/analytics/answer/11202874
billingModel:
  pricingCategory: Subscription (Free + Enterprise)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Google Analytics
  ServiceCategory: Web Analytics
  ProviderName: Google
  PublisherName: Google LLC
  InvoiceIssuerName: Google LLC
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: ga4_property_license
    description: Active GA4 Standard or 360 property under the account
    unit: property
    aggregation: max
    dimensions:
      - sku
      - region
  - name: data_api_tokens
    description: Tokens consumed against the Data API token quota (Core/Realtime/Funnel)
    unit: token
    aggregation: sum
    dimensions:
      - property
      - category
      - api_method
  - name: api_requests
    description: Count of Data API / Admin API / Measurement Protocol requests
    unit: request
    aggregation: sum
    dimensions:
      - api
      - property
      - consumer
  - name: bigquery_export_volume
    description: Bytes exported from GA4 to BigQuery (billed via the BigQuery surface, not GA)
    unit: GB
    aggregation: sum
    dimensions:
      - property
      - dataset
apis:
  - name: Google Analytics Data API (GA4)
    baseURL: https://analyticsdata.googleapis.com
    serviceName: Google Analytics Data API (GA4)
    serviceCategory: Web Analytics
  - name: Google Analytics Admin API
    baseURL: https://analyticsadmin.googleapis.com
    serviceName: Google Analytics Admin API
    serviceCategory: Web Analytics
  - name: Google Analytics Measurement Protocol (GA4)
    baseURL: https://www.google-analytics.com
    serviceName: Google Analytics Measurement Protocol (GA4)
    serviceCategory: Web Analytics
  - name: Google Analytics User Deletion API
    baseURL: https://www.googleapis.com/analytics/v3
    serviceName: Google Analytics User Deletion API
    serviceCategory: Web Analytics
principles:
  - name: Visibility
    description: Send returnPropertyQuota=true on Data API calls to surface remaining Core/Realtime/Funnel
      tokens; pipe quota telemetry into Cloud Monitoring or BigQuery for trend dashboards.
  - name: Allocation
    description: Allocate Analytics 360 license cost to product lines via property mapping; for Standard,
      tag API consumers by GCP project and property to chargeback the BigQuery export side of the cost.
  - name: Optimization
    description: Reduce Core token spend by lowering report cardinality, narrowing date ranges, batching
      requests via runReport batch, and caching repeat queries. Move heavy analytical workloads to BigQuery
      export rather than the Data API.
  - name: Accountability
    description: Designate a property owner per GA4 property; review quota burn weekly and escalate to
      a 360 upgrade only when token throttling materially blocks reporting needs.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
